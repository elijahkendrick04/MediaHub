<style>
:root {
  --ink: #E6ECF5;
  --ink-dim: #8A95A8;
  --ink-muted: #6B7689;
  --base: #0B1220;
  --panel: #111A2E;
  --border: rgba(255,255,255,0.06);
  --accent: #22D3EE;
  --accent-hover: #06B6D4;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--base); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif; min-height: 100vh; }
body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; line-height: 1.5; }
.wrap { max-width: 640px; width: 100%; text-align: center; }
.logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 24px; color: var(--accent); }
.logo span { font-size: 18px; font-weight: 700; color: var(--ink); letter-spacing: -0.01em; }
h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 14px; line-height: 1.15; }
p { color: var(--ink-dim); font-size: 16px; margin-bottom: 24px; }
.cta { display: inline-flex; align-items: center; gap: 8px; padding: 12px 22px; background: var(--accent); color: #0B1220; border-radius: 10px; font-weight: 600; text-decoration: none; transition: background 150ms; font-size: 15px; }
.cta:hover { background: var(--accent-hover); }
.dim { color: var(--ink-muted); font-size: 13px; margin-top: 18px; }
.dim a { color: var(--accent); text-decoration: none; }
.dim a:hover { text-decoration: underline; }
.loading-dot { display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.4s ease-in-out infinite; margin-right: 6px; }
@keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M2 12c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2"/>
      <path d="M2 17c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2"/>
      <path d="M2 7c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2"/>
    </svg>
    <span>MediaHub</span>
  </div>

  <h1>Club content automation</h1>
  <p>Upload meet results. Get ranked, source-grounded content cards with PB accuracy, editorial controls, and a brandable approval workflow.</p>

  <a class="cta" href="/port/5000/">
    <span class="loading-dot"></span>
    Open MediaHub →
  </a>

  <p class="dim">
    <noscript>JavaScript is disabled. <a href="/port/5000/">Click here to enter the app.</a></noscript>
    Pilot for Swansea University Swimming · Built on swim meet results · <a href="/port/5000/research">Research roadmap</a>
  </p>
</div>

<script>
// Auto-redirect after 600ms (gives crawlers time to read meta tags)
setTimeout(function() { window.location.replace('/port/5000/'); }, 600);
</script>
</body>
</html>
