# Unit Test Suite — the full `pytest tests/` gate, SHARDED for speed.
#
# WHY THIS EXISTS: the other CI workflows only run narrow slices of the suite
# (the responsive contract, the API contract, the security scans). The full
# unit suite was never a gate, so feature branches that each pass their own
# tests could still collide on shared surfaces — the logged-out landing page
# especially — and land a *latent* red on main that nothing caught. Two real
# examples: U.8's pipeline diagram silently overwrote UI 1.3's inline-thumbnail
# headline, and U.15's before/after section tripped two U.5 reveal invariants.
# Both only surfaced when someone ran `pytest tests/` by hand. This workflow
# runs the whole suite on every PR and on push to the trunk, so a cross-feature
# collision reddens the PR instead of slipping onto main.
#
# SHARDED FOR SPEED (and the gate stays a single check): the suite (~8.4k tests)
# took ~10 min in one job. pytest-split now partitions the collected tests into
# `strategy.job-total` balanced groups — weighted by the committed `.test_durations`
# map — and a matrix of runners takes one group each, so wall-clock drops ~linearly
# with the shard count. The partition is TOTAL and DISJOINT: every collected test
# runs in exactly one shard, and `-p no:randomly` freezes collection order (hence
# the partition), so the gate never double-runs or silently drops a test. Tests
# added since the last map refresh still run — they just fall back to an average
# time estimate for balancing (staleness shifts balance, never coverage). The
# `Full unit suite (pytest)` job at the bottom is the SINGLE aggregate gate: it
# goes green only if every shard AND the engine oracle pass, so that one stable
# check name is what branch protection requires for main (a repo-settings change).
#
# It also gates the DETERMINISTIC-ENGINE ground-truth oracle (its own job below):
# the real pipeline on the fixed sample meet, diffed against the committed golden
# baseline. The rest of tests/test_autotest_* stays in autotest.yml, but this one
# regression oracle must redden a PR rather than only the 6-hourly schedule — see
# that job's comment for the why.
#
# Chromium IS installed (cached across runs, keyed on the Playwright version so
# unrelated dep churn doesn't force a cold re-download) and the renderer/browser
# tests run against it on the shards; only the handful pinned to a specific local
# Chromium build self-skip when that exact revision is absent. Deps mirror the
# runtime image (requirements.txt) + the test tooling (.[dev]) so optional
# modules import rather than erroring.
#
# REFRESH SHARD BALANCE after a big batch of new/removed tests — regenerate the
# duration map and commit it:
#   pytest tests/ --ignore-glob='tests/test_autotest_*.py' --store-durations
#   git add .test_durations

name: Unit Test Suite

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unit-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shard:
    name: Suite shard ${{ matrix.group }}
    runs-on: ubuntu-latest
    # ~7 min on a warm Playwright cache (≈4 min tests + setup). The headroom is
    # for the rare COLD cache: each shard does its own `playwright install`, and
    # a true cold-cache run can hit a slow apt/CDN fetch (observed ~12 min once).
    # The browser cache now keys on the Playwright VERSION (not the churny dep
    # hash) with a prefix restore-key, so cold misses are rare — but the timeout
    # still clears that worst case so transient install slowness can never
    # falsely fail a shard.
    timeout-minutes: 20
    strategy:
      # One shard failing must NOT cancel the others — we want every failure in
      # one run, not just the first shard to go red.
      fail-fast: false
      matrix:
        # Edit ONLY this list to change the shard count. `--splits` below reads
        # strategy.job-total, so the split count can never drift from the matrix.
        group: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MediaHub (runtime + dev extras)
        run: |
          python -m pip install --upgrade pip
          # Runtime deps mirror the deployed image so optional modules (rembg,
          # onnxruntime, playwright, sqlite-vec, …) import instead of erroring;
          # the dev extra adds pytest + xdist + pytest-split + reportlab + schemathesis.
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Resolve Playwright version (stable browser-cache key)
        id: pw
        # Chromium's bundled revision is determined by the Playwright version
        # ALONE, so the browser cache must key on that — not on a hash of the
        # whole requirements.txt/pyproject.toml. Hashing the dep files meant any
        # unrelated dependency bump (frequent) minted a new key and forced a
        # ~12-min cold Chromium re-download (the "cold-cache Chromium" slowness).
        run: echo "version=$(python -m playwright --version | cut -d' ' -f2)" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        # The Chromium download is ~115 MB; cache it so only the first run on a
        # new Playwright version pays for it. The prefix restore-key reuses an
        # existing browser across version bumps too (`playwright install` then
        # just verifies and skips the download), so the cache effectively never
        # goes fully cold once any run has populated it.
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Chromium for the renderer/browser tests
        run: python -m playwright install --with-deps chromium

      - name: Run shard ${{ matrix.group }}/${{ strategy.job-total }}
        run: |
          # pytest-split partitions the collected suite into strategy.job-total
          # balanced groups (by .test_durations) and this runner takes its group;
          # within the shard, -n auto spreads it across the runner's cores. The
          # autonomous-tester FRAMEWORK self-tests (tests/test_autotest_*) stay in
          # autotest.yml — EXCEPT the ground-truth oracle, carved into its own job
          # below. -p no:randomly keeps collection (hence the partition) stable so
          # no test is double-run or dropped across shards.
          python -m pytest tests/ \
            --ignore-glob='tests/test_autotest_*.py' \
            --splits ${{ strategy.job-total }} --group ${{ matrix.group }} \
            --durations-path .test_durations \
            -q -p no:randomly -n auto --tb=short

  oracle:
    name: Ground-truth oracle (deterministic engine gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MediaHub (runtime + dev extras)
        run: |
          # No Chromium here on purpose: the oracle runs run_pipeline_v4 (parse →
          # detect → rank → build cards) and diffs structured output — it never
          # renders, so it needs the runtime deps but not the browser.
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Ground-truth regression oracle (deterministic engine gate)
        run: |
          # CARVE-OUT from the test_autotest_* exclusion in the shards above. The
          # broad ignore keeps the autonomous-tester FRAMEWORK self-tests (xdist-
          # worker-sensitive on CI's small core count) in autotest.yml — but the
          # ground-truth oracle is a different animal: it runs the REAL pipeline on
          # the fixed sample meet and diffs the deterministic output (parser swim
          # count, club match, card/achievement counts, known swimmers) against the
          # committed golden baseline. A stale baseline OR a real parser / detector
          # / ranker drift must redden the PR here — not sit latent until the
          # 6-hourly autotest.yml run. That latency is exactly how the golden
          # baseline went stale behind the multi-column PDF fix (#631): the count
          # moved 1217 -> 3597 on main and nothing reddened a PR. Run SERIALLY
          # (no -n) so the result never depends on xdist worker distribution;
          # -p no:randomly keeps it order-stable.
          python -m pytest tests/test_autotest_ground_truth.py \
            -q -p no:randomly --tb=short

  full-suite:
    name: Full unit suite (pytest)
    # The SINGLE aggregate gate. Keeping this job name stable means the existing
    # `Full unit suite (pytest)` branch-protection required check still maps here,
    # now backed by every shard plus the oracle. `if: always()` so it still runs
    # when a dependency failed and collapses the matrix + oracle into one red/green
    # status. A skipped/cancelled dependency is treated as not-success.
    needs: [shard, oracle]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require all shards and the oracle to pass
        run: |
          echo "shards: ${{ needs.shard.result }}"
          echo "oracle: ${{ needs.oracle.result }}"
          if [ "${{ needs.shard.result }}" != "success" ] || [ "${{ needs.oracle.result }}" != "success" ]; then
            echo "::error::Unit suite failed (shards=${{ needs.shard.result }}, oracle=${{ needs.oracle.result }})"
            exit 1
          fi
          echo "All shards and the ground-truth oracle passed."
