# Repo hygiene — keeps the tree tidy on every PR.
#
# Both jobs are scoped to what a PR actually changes — never the whole
# pre-existing tree — so they don't retroactively flag the legacy monolith or the
# downloaded *-main toolkits:
#   1. pre-commit   — runs the hygiene hooks on the files THIS PR changed.
#                     Advisory for now (continue-on-error) so the team can adopt
#                     ruff without it blocking merges; flip it to blocking once
#                     the back-catalogue is clean.
#   2. bloat-guard  — fails a PR only if it ADDS a too-large file or an unusually
#                     large batch of NEW files. It diffs against the PR base and
#                     looks only at added files, so the existing *-main folders
#                     are never counted — it just stops the next accidental
#                     ZIP-dump from landing.
name: Repo hygiene

on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repo-hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Hygiene hooks (pre-commit)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    if: github.event_name == 'pull_request'
    continue-on-error: true            # advisory during rollout — see file header
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0               # need the base commit for the changed-files diff
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip pre-commit
      - name: Run hooks on the files this PR changes
        run: |
          pre-commit run \
            --from-ref "${{ github.event.pull_request.base.sha }}" \
            --to-ref "${{ github.event.pull_request.head.sha }}" \
            --show-diff-on-failure

  bloat-guard:
    name: New-file bloat guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0               # need base history for the diff
      - name: Fail on large or excessive NEW files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MAX_KB: "1500"               # matches check-added-large-files
          MAX_NEW_FILES: "300"         # *-main folders are pre-existing, never counted
        run: |
          # Only files this PR ADDS (status=A) versus the base — never pre-existing files.
          mapfile -t added < <(git diff --name-only --diff-filter=A "$BASE_SHA" "$HEAD_SHA")
          echo "PR adds ${#added[@]} new file(s)."
          fail=0
          if [ "${#added[@]}" -gt "$MAX_NEW_FILES" ]; then
            echo "::error::This PR adds ${#added[@]} new files (limit $MAX_NEW_FILES). If this is an intentional vendored drop, raise MAX_NEW_FILES in repo-hygiene.yml."
            fail=1
          fi
          for f in "${added[@]}"; do
            [ -f "$f" ] || continue
            kb=$(( ( $(stat -c%s "$f") + 1023 ) / 1024 ))
            if [ "$kb" -gt "$MAX_KB" ]; then
              echo "::error::New file too large: $f (${kb} KB > ${MAX_KB} KB). Add it to .gitignore or store it outside git."
              fail=1
            fi
          done
          exit $fail
