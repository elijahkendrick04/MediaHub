# C1 — Upptime external synthetic monitor (GitHub-Actions-native, zero-server).
# Runs the uptime check against the live URLs in .upptimerc.yml, opening/closing a
# GitHub Issue on down/up. SEPARATE from the autotest finder/fixer: uptime incidents
# flow through Upptime's own issues (C2), NOT autotest/notify.py (which is reserved
# for confirmed FUNCTIONAL bugs).
#
# SCAFFOLD — dispatch-only by default. To turn the monitor on:
#   1. Add a fine-grained `GH_PAT` secret (contents + issues write).
#   2. Uncomment the `schedule` block below (every 5 min).
# See monitoring/README.md.

name: Uptime monitor (Upptime)

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "*/5 * * * *"   # enable after adding the GH_PAT secret

permissions:
  contents: write
  issues: write

concurrency:
  group: upptime
  cancel-in-progress: false

jobs:
  uptime:
    name: Check uptime + behaviour
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_PAT: ${{ secrets.GH_PAT }}
    steps:
      - name: Guard — require GH_PAT before doing anything
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "::warning::Upptime not configured — add a GH_PAT secret to enable (monitoring/README.md)."
          fi
      - uses: actions/checkout@v4
        if: ${{ env.GH_PAT != '' }}
      - uses: upptime/uptime-monitor-action@v1
        if: ${{ env.GH_PAT != '' }}
        with:
          command: "update"
