# B4 — Lighthouse CI: accessibility / best-practices / SEO scores + Core Web Vitals
# budgets against the LIVE Render deployment. Separate from the autotest sweep (it
# does not gate the pytest suite or the fixer). Category SCORES are asserted as errors
# (stable signals); raw timing metrics are warnings (documented CI noise), and the
# median of 3 runs is used to fight per-run variance. Tune thresholds in
# .github/lighthouse/lighthouserc.json once the prod baseline is known.

name: Lighthouse (perf + a11y budgets)

on:
  schedule:
    - cron: "30 3 * * *"   # nightly, offset from the 6h autotest sweep
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lighthouse
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI against the live site
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .github/lighthouse/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
