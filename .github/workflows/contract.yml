# B5 — API contract testing (Schemathesis + the no-5xx smoke). Runs the dedicated
# contract test with Schemathesis installed (the dev extra), so the property-based
# fuzz of the introspected /api surface actually executes here (it honest-skips in
# the main suite when Schemathesis is absent). Deterministic: a 5xx/serialisation
# failure is a real defect, surfaced here without gating the full suite or the fixer.

name: API contract (Schemathesis)

on:
  pull_request:
    paths:
      - "src/mediahub/web/**"
      - "autotest/openapi.py"
      - "tests/test_api_contract.py"
      - ".github/workflows/contract.yml"
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: Schemathesis contract sweep
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install MediaHub + Schemathesis
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run the API contract test (Schemathesis enabled)
        run: python -m pytest tests/test_api_contract.py -v -p no:cacheprovider
