# Roadmap auto-update — keeps docs/ROADMAP.md current on every push to main.
#
# On each push to `main` this workflow runs scripts/roadmap_autoupdate.py, which:
#   1. sweeps completed items: any to-do item already hand-marked with a ✅
#      badge is MOVED off its to-do list into the Completed list (dated from
#      the badge), no directive needed. A human remainder declared on the
#      line ("Founder half open = F.1/F.6", "founder remainder: <text>") is
#      kept on the founder list — free-text remainders are filed as NEW F.*
#      founder items flagged as needing their step-by-step guide,
#   2. refreshes the "Last updated" stamp (date · short SHA · subject),
#   3. refreshes the "Recent code activity" feed (last ~12 non-bot commits),
#   4. applies any `roadmap: <ID> <status>` directives found in the pushed
#      commit messages (e.g. `roadmap: P1.2 done`, `roadmap: F.2 done`):
#      `done` MOVES the item from its to-do list (founder or Fable 5) into
#      the Completed list (date-stamped); any other status sets the item's
#      badge in place, or returns a Completed item to the right to-do list
#      (`F.*` ids -> the founder list, everything else -> the main list).
#
# Landing mechanism (fixed 2026-06-10): `main` is branch-protected and
# REQUIRES changes via pull request, so the old direct commit-back was
# rejected with GH006 on every run (the fail-soft step swallowed it as a
# warning, which is how the stamp silently stalled for ~38 merges). The
# refreshed file is now pushed to the single-purpose branch
# `bot/roadmap-autoupdate` and landed through a PR with auto-merge — it
# merges itself the moment the required checks pass, with no human in the
# loop and no protection bypass. One repo setting must stay on for the
# hands-free landing: Settings → General → "Allow auto-merge". If that is
# ever switched off, the PR is still created and left open with a warning
# (one click to land) — updates are never silently lost again.
#
# Why only `main`? So the file-disjoint feature-branch PRs (Appendix A's
# parallel bucket) never collide on ROADMAP.md — the roadmap moves when work
# *lands* on the mainline, not on every feature-branch push.
#
# Self-conflict fix (2026-06-13): every refresh rewrites the SAME lines (the
# LAST_UPDATED stamp + the top of the ACTIVITY table), so a bot PR computed
# from the stale triggering checkout was dead-on-arrival the moment another
# roadmap refresh landed first — GitHub marked it `dirty` and auto-merge
# stalled. Two changes keep the single PR path conflict-free:
#   * the refresh is regenerated on top of the FRESHEST main — the job
#     re-fetches and resets the bot branch to origin/main before running the
#     script, so the branch is always exactly "latest main + roadmap delta"
#     and its PR can never conflict on those shared lines; and
#   * the PR lands by SQUASH, so each refresh is ONE tidy
#     `docs: auto-update roadmap (#N) [skip render]` commit on main, not a
#     merge commit plus a sibling branch commit (which read like two writers).
#
# Loop safety, three layers:
#   1. pushes/merges made with the built-in GITHUB_TOKEN do not trigger
#      `push` workflows, so the bot's own merge cannot recurse;
#   2. the job-level `if` skips bot-roadmap merge commits anyway;
#   3. the diff-quiet guard exits early when nothing changed.
# The bot commit deliberately does NOT carry `[skip ci]`: the required
# checks must run on the bot PR or branch protection would hold the
# auto-merge forever.

name: Roadmap auto-update

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: read  # the "Production findings" block lists open `sentinel` issues

concurrency:
  group: roadmap-autoupdate
  cancel-in-progress: false

jobs:
  update:
    name: Update roadmap
    runs-on: ubuntu-latest
    # Belt-and-braces loop guard (layer 2): never re-run for the bot's own
    # roadmap landing. workflow_dispatch has no head_commit — always allowed.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!contains(github.event.head_commit.message, 'bot/roadmap-autoupdate') &&
       !startsWith(github.event.head_commit.message, 'docs: auto-update roadmap'))
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for the commit range + activity feed

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Branch the refresh off the freshest main
        # Regenerate on top of the live origin/main, NOT the (possibly stale)
        # commit that triggered this run: concurrent feature merges advance
        # main while this job queues, and every refresh edits the same
        # stamp/activity lines. Building the bot branch from the current tip
        # makes the resulting PR exactly "latest main + roadmap delta", so it
        # can never conflict with a roadmap refresh that landed first.
        run: |
          git fetch --no-tags --force origin main
          git checkout -B bot/roadmap-autoupdate FETCH_HEAD

      - name: Refresh ROADMAP.md
        env:
          # For the sentinel-issues fetch (read-only; fail-soft to "leave the
          # block as it was" when the API is unreachable).
          GITHUB_TOKEN: ${{ github.token }}
          ROADMAP_BEFORE: ${{ github.event.before }}
          ROADMAP_AFTER: ${{ github.sha }}
        run: python scripts/roadmap_autoupdate.py

      - name: Land via auto-merge PR (main requires PRs)
        env:
          # Prefer the PAT when configured: a PR opened with the built-in
          # github.token does not get its pull_request workflows run
          # automatically (anti-recursion + approval gates), which deadlocks
          # auto-merge the moment main gains required status checks. A
          # PAT-authored PR runs CI like any human PR. Falls back to
          # github.token so the workflow still functions without the secret.
          GH_TOKEN: ${{ secrets.AUTOTEST_GH_PAT || github.token }}
        run: |
          if git diff --quiet -- docs/ROADMAP.md docs/ROADMAP_BUILT.md; then
            echo "No roadmap changes — nothing to land."
            exit 0
          fi
          BRANCH=bot/roadmap-autoupdate   # already checked out from origin/main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ROADMAP.md docs/ROADMAP_BUILT.md
          # [skip render]: a roadmap refresh is docs-only — deploying it is
          # pure waste, and these bot deploys have repeatedly wedged
          # Render's build queue (queued with zero build logs for hours,
          # blocking real deploys behind them). The marker must also ride the
          # merge commit subject below — that's the commit Render inspects on
          # a push to main.
          git commit -m "docs: auto-update roadmap [skip render]"
          # Single-purpose branch, rebuilt from origin/main this run: force-push
          # is safe and refreshes any still-open bot PR to the newest state.
          git push --force origin "$BRANCH"
          PR=$(gh pr list --head "$BRANCH" --base main --state open \
                 --json number --jq '.[0].number' || true)
          if [ -z "$PR" ]; then
            URL=$(gh pr create --head "$BRANCH" --base main \
              --title "docs: auto-update roadmap" \
              --body "Automated ROADMAP.md refresh (stamp, activity feed, status directives) for the latest push to main. Lands itself via auto-merge once the required checks pass.")
            PR=${URL##*/}
            echo "Opened roadmap PR #$PR"
          else
            echo "Reusing open roadmap PR #$PR"
          fi
          # The repo standardises on merge commits (squash disabled repo-wide),
          # so land with --merge. The [skip render] marker still rides the merge
          # commit subject via --subject — that's the commit Render inspects — so
          # the docs-only refresh never triggers a deploy. --auto arms auto-merge
          # while checks are pending; a docs-only PR is often ALREADY clean by
          # now, and GitHub refuses to arm auto-merge on a clean PR — so fall
          # through to an immediate --merge. Only if both fail (auto-merge
          # disabled repo-side AND checks pending/failed) is the PR left open for
          # a human — preserved, never lost.
          if gh pr merge "$PR" --merge --auto \
               --subject "docs: auto-update roadmap (#${PR}) [skip render]"; then
            echo "Auto-merge armed on PR #$PR — lands when checks pass."
          elif gh pr merge "$PR" --merge \
               --subject "docs: auto-update roadmap (#${PR}) [skip render]"; then
            echo "PR #$PR was already clean — merged directly."
          else
            echo "::warning::Could not land PR #$PR automatically. Enable"
            echo "::warning::Settings → General → 'Allow auto-merge', or merge"
            echo "::warning::the PR by hand — the update is preserved either way."
          fi
