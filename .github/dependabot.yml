# Dependency update PRs (security/supply-chain-ci). Weekly, grouped.
# Policy split (2026-06-12, operator decision): github-actions bumps
# auto-merge on all-green checks via dependabot-automerge.yml (CI-only
# blast radius, fully exercised by the PR's own checks); pip / npm /
# docker bumps stay a human-reviewed stream — PR checks don't run the
# full pytest suite and main auto-deploys, so a green tick alone does
# not validate a runtime dependency change.
version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]
  - package-ecosystem: npm
    directory: "/src/mediahub/remotion"
    schedule:
      interval: weekly
    groups:
      remotion-deps:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
