<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 200" role="img" aria-label="A branded story card">
  <title>Story card (output) — Tom Davies, personal best, 100m free 52.41</title>
  <!-- OUTPUT: a 9:16 story graphic in the club palette. Lane-yellow top rule,
       athlete name in display caps, the time as the hero numeral, and the PB
       delta on a medal-gold chip (gold reserved for achievement). Same facts
       the engine parsed from the results sheet. Self-contained vector. -->
  <rect width="144" height="200" fill="#0A0B11"/>
  <!-- faint scoreboard grid -->
  <g stroke="#F5F2E8" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="118" x2="144" y2="118"/>
    <line x1="48" y1="0" x2="48" y2="200"/>
    <line x1="96" y1="0" x2="96" y2="200"/>
  </g>
  <!-- brand top rule -->
  <rect width="144" height="4" fill="#D4FF3A"/>
  <!-- eyebrow -->
  <text x="13" y="26" font-family="monospace" font-size="7" font-weight="700" letter-spacing="1.4" fill="#D4FF3A">PB &#183; 100 FREE</text>
  <!-- athlete name -->
  <g font-family="Arial, Helvetica, sans-serif" font-weight="800" fill="#F5F2E8" letter-spacing="-0.5">
    <text x="13" y="66" font-size="23">TOM</text>
    <text x="13" y="89" font-size="23">DAVIES</text>
  </g>
  <rect x="13" y="99" width="24" height="2.4" fill="#D4FF3A"/>
  <!-- hero time -->
  <text x="13" y="150" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="42" letter-spacing="-1.5" fill="#F5F2E8">52.41</text>
  <!-- PB delta chip (medal gold) -->
  <rect x="13" y="159" width="48" height="17" rx="8.5" fill="#F4D58D"/>
  <text x="37" y="171" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="9" fill="#2B1F00">&#8722;0.74s</text>
  <!-- footer wordmark + lane number -->
  <text x="13" y="192" font-family="monospace" font-size="6.5" letter-spacing="0.8" fill="#B6B2A6">RIVERSIDE SC</text>
  <text x="132" y="194" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="15" fill="#D4FF3A" opacity="0.9">04</text>
</svg>
