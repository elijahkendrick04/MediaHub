<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 200" role="img" aria-label="A swim results sheet">
  <title>Results sheet (input) — Event 14, 100m freestyle</title>
  <!-- INPUT: a Hytek-style A4 results listing. Paper-cream document with a
       dark header and a column of finishing times. This is what a club
       uploads; the engine reads it. Self-contained vector, no external refs. -->
  <rect width="144" height="200" fill="#F5F2E8"/>
  <!-- header strip -->
  <rect width="144" height="40" fill="#0A0B11"/>
  <text x="12" y="22" font-family="monospace" font-size="11" font-weight="700" letter-spacing="2" fill="#D4FF3A">RESULTS</text>
  <text x="12" y="33" font-family="monospace" font-size="6.5" letter-spacing="0.6" fill="#B6B2A6">EVENT 14 &#183; 100 FREE</text>
  <!-- column header + rule -->
  <text x="12" y="52" font-family="monospace" font-size="6" letter-spacing="0.8" fill="#8A8678">PL  SWIMMER         TIME</text>
  <line x1="12" y1="55" x2="132" y2="55" stroke="#0A0B11" stroke-opacity="0.22" stroke-width="1"/>
  <!-- detection foreshadow: a lane-yellow tick beside the fastest swim -->
  <rect x="5" y="58" width="2.6" height="14" rx="1.3" fill="#D4FF3A"/>
  <!-- rows: rank numeral, a name bar, and a finishing time -->
  <g font-family="monospace" font-size="7" fill="#0A0B11">
    <text x="13" y="68" text-anchor="middle" opacity="0.85">1</text>
    <rect x="24" y="62" width="74" height="7" rx="2" fill="#0A0B11" opacity="0.16"/>
    <text x="132" y="68" text-anchor="end" font-weight="700">52.41</text>

    <text x="13" y="86" text-anchor="middle" opacity="0.85">2</text>
    <rect x="24" y="80" width="62" height="7" rx="2" fill="#0A0B11" opacity="0.14"/>
    <text x="132" y="86" text-anchor="end">53.18</text>

    <text x="13" y="104" text-anchor="middle" opacity="0.85">3</text>
    <rect x="24" y="98" width="80" height="7" rx="2" fill="#0A0B11" opacity="0.14"/>
    <text x="132" y="104" text-anchor="end">54.02</text>

    <text x="13" y="122" text-anchor="middle" opacity="0.85">4</text>
    <rect x="24" y="116" width="58" height="7" rx="2" fill="#0A0B11" opacity="0.12"/>
    <text x="132" y="122" text-anchor="end">54.77</text>

    <text x="13" y="140" text-anchor="middle" opacity="0.85">5</text>
    <rect x="24" y="134" width="70" height="7" rx="2" fill="#0A0B11" opacity="0.12"/>
    <text x="132" y="140" text-anchor="end">55.30</text>

    <text x="13" y="158" text-anchor="middle" opacity="0.85">6</text>
    <rect x="24" y="152" width="52" height="7" rx="2" fill="#0A0B11" opacity="0.11"/>
    <text x="132" y="158" text-anchor="end">56.91</text>

    <text x="13" y="176" text-anchor="middle" opacity="0.85">7</text>
    <rect x="24" y="170" width="66" height="7" rx="2" fill="#0A0B11" opacity="0.11"/>
    <text x="132" y="176" text-anchor="end">58.04</text>
  </g>
  <!-- footer page mark -->
  <text x="12" y="193" font-family="monospace" font-size="5.5" letter-spacing="0.5" fill="#0A0B11" opacity="0.45">HY-TEK &#183; PAGE 1 OF 3</text>
</svg>
