<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>{{TITLE}} — {{MEET_NAME}}</title>
<style>
{{FONTS_CSS}}

/* A4 portrait noticeboard poster — light paper, dark ink, readable from a
   metre away on a leisure-centre corkboard and credible photocopied in mono.
   Colour carries brand (header band, chip rules); hierarchy carries meaning. */
@page { size: A4; margin: 0; }
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 210mm; }
body {
  font-family: 'Inter', sans-serif;
  color: {{INK}};
  background: {{PAPER}};
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
.sheet {
  position: relative;
  width: 210mm;
  height: 296mm; /* a hair under 297 so Chromium never spills a second page */
  overflow: hidden;
  background: {{PAPER}};
  display: flex;
  flex-direction: column;
}

/* Branded masthead */
.masthead {
  padding: 12mm 14mm 9mm;
  background: linear-gradient(135deg, {{PRIMARY}} 0%, {{PRIMARY_DEEP}} 100%);
  color: #FFFFFF;
  border-bottom: 1.6mm solid {{ACCENT}};
}
.masthead .club {
  font-family: 'Space Grotesk', 'Inter', sans-serif;
  font-weight: 600;
  font-size: 10pt;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  opacity: 0.92;
}
.masthead .title {
  margin-top: 3mm;
  font-family: 'Anton', 'Bebas Neue', sans-serif;
  font-size: 38pt;
  line-height: 1.02;
  text-transform: uppercase;
  letter-spacing: 0.01em;
}
.masthead .meet {
  margin-top: 3mm;
  font-family: 'Space Grotesk', 'Inter', sans-serif;
  font-weight: 600;
  font-size: 12pt;
  letter-spacing: 0.10em;
  text-transform: uppercase;
}

.content { flex: 1; padding: 9mm 14mm 0; display: flex; flex-direction: column; }

.section-lab {
  font-family: 'Space Grotesk', 'Inter', sans-serif;
  font-weight: 700;
  font-size: 9pt;
  letter-spacing: 0.30em;
  text-transform: uppercase;
  color: {{PRIMARY_DEEP}};
  border-bottom: 0.5mm solid {{INK}};
  padding-bottom: 1.6mm;
  margin-bottom: 4mm;
}

/* Big stat chips */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(40mm, 1fr));
  gap: 4mm;
  margin-bottom: 8mm;
}
.stat-chip {
  border: 0.6mm solid {{INK}};
  border-top: 2mm solid {{PRIMARY}};
  background: #FFFFFF;
  padding: 4mm 3mm 3.5mm;
  text-align: center;
}
.stat-chip .num {
  font-family: 'Anton', 'Bebas Neue', sans-serif;
  font-size: 30pt;
  line-height: 1.0;
  color: {{INK}};
}
.stat-chip .lab {
  margin-top: 1.6mm;
  font-family: 'Space Grotesk', 'Inter', sans-serif;
  font-weight: 600;
  font-size: 8.5pt;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: {{PRIMARY_DEEP}};
}

/* Highlights table */
table.highlights { width: 100%; border-collapse: collapse; }
table.highlights th {
  font-family: 'Space Grotesk', 'Inter', sans-serif;
  font-weight: 700;
  font-size: 8.5pt;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  text-align: left;
  color: #FFFFFF;
  background: {{PRIMARY_DEEP}};
  padding: 2.4mm 3mm;
}
table.highlights td {
  font-size: 10pt;
  padding: 2.2mm 3mm;
  border-bottom: 0.3mm solid #C9C4BA;
  vertical-align: top;
}
table.highlights tr:nth-child(even) td { background: #F4F1E9; }
table.highlights td.sw { font-weight: 700; white-space: nowrap; }
table.highlights td.tm {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  white-space: nowrap;
}
table.highlights td.nt { color: #4A4742; }

.no-highlights {
  border: 0.5mm dashed #B9B4AA;
  background: #FFFFFF;
  padding: 8mm;
  text-align: center;
  font-size: 11pt;
  font-style: italic;
  color: #4A4742;
}

/* Footer band */
.footer {
  margin-top: auto;
  padding: 5mm 14mm;
  background: {{INK}};
  color: #FFFFFF;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  border-top: 1.2mm solid {{ACCENT}};
}
.footer .club {
  font-family: 'Space Grotesk', 'Inter', sans-serif;
  font-weight: 700;
  font-size: 10.5pt;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.footer .made {
  font-size: 7.5pt;
  letter-spacing: 0.08em;
  opacity: 0.85;
}
</style>
</head>
<body>
<div class="sheet">
  <div class="masthead">
    <div class="club">{{CLUB_NAME}}</div>
    <div class="title">{{TITLE}}</div>
    <div class="meet">{{MEET_NAME}}</div>
  </div>

  <div class="content">
    <div class="section-lab">The weekend in numbers</div>
    <div class="stat-grid">
      {{STAT_CHIPS}}
    </div>

    <div class="section-lab">Highlights</div>
    {{HIGHLIGHTS_BLOCK}}
  </div>

  <div class="footer">
    <div class="club">{{CLUB_NAME}}</div>
    <div class="made">Verified from official results &mdash; generated by MediaHub</div>
  </div>
</div>
</body>
</html>
