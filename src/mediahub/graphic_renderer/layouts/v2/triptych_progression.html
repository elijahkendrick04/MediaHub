<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>{{ATHLETE_FULL_NAME}}</title>
<style>{{BASE_CSS}}

/* ===================================================================
   triptych_progression  (v2 archetype, PAR-7)

   A three-panel composition that splits the canvas into THREE equal
   full-height vertical columns separated by accent seams, read as a
   left-to-right progression:

     [ 1 WHO ]        the brand-ground panel: kicker (achievement),
                      first name + an oversized surname, the event.
     [ 2 RESULT ]     the dominant ACCENT panel: a vertical "RESULT"
                      spine and the headline time/mark, set large and
                      centred. Accent is the one role the resolver
                      guarantees contrasts the primary (APCA gate), so
                      primary-on-accent here is a gate-checked legible
                      pair (not a hex literal).
     [ 3 CONTEXT ]    the surface panel: the meet, an optional highlight
                      chip, and the club lockup anchored at the foot.

   Structural signature: three equal vertical bays with a triptych seam
   rhythm and a centred accent spine, which reads at a glance as a
   different card from the centred numeral (big_number_dominant), the
   angled wedge (split_diagonal_hero), the vertical right RAIL
   (stat_stack_sidebar) and the horizontal broadcast bands
   (ticker_strip). The distinctiveness comes from COLUMN GEOMETRY, not a
   recolour, so it reads as new structure even on an all-dark kit where
   ground/surface luminance is close.

   Overflow safety: each panel is ~1/3 of the canvas (~328px content
   after padding), far narrower than the full-canvas single-line boxes
   the renderer's autofit vars assume (surname fit ~= 86% of canvas,
   result fit ~= 52%). So the surname is scaled to the bay via
   calc(var * 0.34) AND allowed to WRAP/break-anywhere (a long or
   space-less name flows to extra lines instead of clipping into the
   seam); the result is scaled via calc(var * 0.52) and also breaks. The
   first-name line breaks too. Holds at 1080x1350 and 1080x1920: the
   columns simply grow taller, the foot stays bottom-anchored. No photo
   required; a supplied portrait sits as a quiet desaturated wash behind
   panel 1 rather than as the focal element.
   =================================================================== */

.tp {
  position: relative;
  width: {{WIDTH}}px;
  height: {{HEIGHT}}px;
  overflow: hidden;
  display: flex;
  background: var(--mh-ground-gradient, var(--mh-primary));
  color: var(--mh-on-primary);
  font-family: 'Inter', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}
.tp *, .tp *::before, .tp *::after { box-sizing: border-box; }

/* ---- three equal full-height bays ---- */
.tp__bay {
  flex: 1 1 0;
  position: relative;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 86px 46px 80px;
}

/* panel 1 — WHO (brand ground) */
.tp__who { justify-content: center; background: var(--mh-primary); color: var(--mh-on-primary); }
.tp__photo { position: absolute; inset: 0; z-index: 0; opacity: 0.14; }
.tp__photo img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: var(--mh-photo-pos, center 28%);
  filter: grayscale(1) contrast(1.05);
}
.tp__who > * { position: relative; z-index: 1; }
.tp__kicker {
  display: flex; align-items: center; gap: 14px;
  font-family: 'Space Grotesk','Inter',sans-serif; font-weight: 700;
  font-size: 23px; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--mh-accent); margin-bottom: 26px;
}
.tp__kicker::before {
  content: ""; width: 44px; height: 7px; border-radius: 4px;
  background: var(--mh-accent); flex: 0 0 auto;
}
.tp__first {
  font-family: 'Space Grotesk','Inter',sans-serif; font-weight: 700;
  font-size: 40px; letter-spacing: 0.01em; text-transform: uppercase;
  color: var(--mh-accent); margin-bottom: 2px;
  white-space: normal; overflow-wrap: anywhere; word-break: break-word;
}
.tp__surname {
  font-family: var(--mh-font-display, 'Anton','Bebas Neue',Impact,sans-serif); font-weight: 400;
  /* full-canvas autofit var scaled to the ~1/3 bay so it cannot spill
     into the seam; em_width under-models Anton, so also allow wrapping. */
  font-size: calc(var(--mh-fit-surname-px, 132px) * 0.34);
  line-height: 0.88; letter-spacing: -0.01em; text-transform: uppercase;
  color: var(--mh-on-primary);
  white-space: normal; overflow-wrap: anywhere; word-break: break-word;
  max-width: 100%;
}
.tp__event {
  margin-top: 34px; padding-top: 26px;
  border-top: 4px solid var(--mh-accent);
  font-family: 'Space Grotesk','Inter',sans-serif; font-weight: 600;
  font-size: 28px; line-height: 1.12; text-transform: uppercase;
  color: var(--mh-on-primary);
  overflow-wrap: anywhere;
}

/* panel 2 — RESULT (dominant accent) */
.tp__result-bay {
  flex: 1 1 0;
  background: var(--mh-accent);
  color: var(--mh-primary);
  align-items: center; justify-content: center;
  text-align: center;
  border-left: 8px solid var(--mh-primary);
  border-right: 8px solid var(--mh-primary);
}
.tp__spine {
  font-family: 'Inter',sans-serif; font-weight: 800;
  font-size: 18px; letter-spacing: 0.42em; text-transform: uppercase;
  color: var(--mh-primary); opacity: 0.78; margin-bottom: 30px;
}
.tp__result {
  font-family: 'JetBrains Mono','Space Grotesk',monospace;
  font-feature-settings: "tnum"; font-weight: 700;
  /* result autofit box is ~52% of canvas; the bay is ~1/3, so scale and
     let it break rather than clip. */
  font-size: calc(var(--mh-fit-result-px, 92px) * 0.52); font-variation-settings: var(--mh-axes-result, normal);
  line-height: 0.92; letter-spacing: -0.01em;
  color: var(--mh-primary);
  white-space: normal; overflow-wrap: anywhere; word-break: break-word;
  max-width: 100%;
}
.tp__result-tag {
  margin-top: 28px;
  font-family: 'Space Grotesk','Inter',sans-serif; font-weight: 700;
  font-size: 21px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--mh-primary);
  overflow-wrap: anywhere;
}
/* no measured hero stat → the tag collapses instead of leaving a stray gap */
.tp__result-tag:empty { display: none; }

/* panel 3 — CONTEXT (surface) */
.tp__context { background: var(--mh-surface); color: var(--mh-on-surface); }
.tp__ctx-top { display: flex; flex-direction: column; gap: 34px; }
.tp__chip { display: flex; flex-direction: column; }
.tp__chip-lab {
  font-family: 'Inter',sans-serif; font-weight: 700; font-size: 15px;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--mh-accent); margin-bottom: 9px;
}
.tp__chip-val {
  font-family: 'Space Grotesk','Inter',sans-serif; font-weight: 600;
  font-size: 25px; line-height: 1.16; color: var(--mh-on-surface);
  overflow-wrap: anywhere;
}
/* the highlight chip collapses entirely when no hero stat is supplied,
   so an empty slot never leaves a dangling label on the column. */
.tp__hero:has(.tp__hero-val:empty) { display: none; }

.tp__ctx-foot { margin-top: auto; padding-top: 30px; border-top: 2px solid var(--mh-outline); }
.tp__logo { height: 58px; width: auto; margin-bottom: 14px; }
.tp__logo img, .tp__logo svg { height: 100%; width: auto; object-fit: contain; display: block; }
.tp__club {
  font-family: 'Inter',sans-serif; font-weight: 800; font-size: 19px;
  line-height: 1.18; text-transform: uppercase; color: var(--mh-on-surface);
  overflow-wrap: anywhere;
}
.tp__sponsor { margin-top: 18px; }
</style>
</head>
<body>
<div class="tp">

  <div class="tp__bay tp__who">
    <div class="tp__photo">{{ATHLETE_IMG_BLOCK}}</div>
    <div class="tp__kicker">{{ACHIEVEMENT_LABEL}}</div>
    <div class="tp__first">{{ATHLETE_FIRST_NAME}}</div>
    <div class="tp__surname">{{ATHLETE_SURNAME_DISPLAY}}</div>
    <div class="tp__event">{{EVENT_NAME}}</div>
  </div>

  <div class="tp__bay tp__result-bay">
    <div class="tp__spine">Result</div>
    <div class="tp__result">{{RESULT_VALUE}}</div>
    <div class="tp__result-tag">{{HERO_STAT}}</div>
  </div>

  <div class="tp__bay tp__context">
    <div class="tp__ctx-top">
      <div class="tp__chip">
        <div class="tp__chip-lab">Meet</div>
        <div class="tp__chip-val">{{MEET_NAME}}</div>
      </div>
      <div class="tp__chip tp__hero">
        <div class="tp__chip-lab">Highlight</div>
        <div class="tp__chip-val tp__hero-val">{{HERO_STAT}}</div>
      </div>
      {{STAT_CHIPS}}
    </div>
    <div class="tp__ctx-foot">
      <div class="tp__logo">{{LOGO_BLOCK}}</div>
      <div class="tp__club">{{CLUB_FULL}}</div>
      <div class="tp__sponsor">{{SPONSOR_BLOCK}}</div>
    </div>
  </div>

  {{ACCENT_DECORATION}}

</div>
</body>
</html>
