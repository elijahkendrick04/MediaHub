<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>{{ATHLETE_FULL_NAME}}</title>
<style>{{BASE_CSS}}

/* ===================================================================
   magazine_cover  (v2 archetype, PAR-7)

   A sports-magazine COVER composition. The signature furniture of a
   newsstand cover — none of which any existing archetype has — makes it
   read as a different card at a glance:

     [ MASTHEAD ]   a full-width top rail: the club set as the title
                    "masthead" on the left, an issue/dateline (the meet)
                    on the right, underscored by a hairline accent rule.
     [ COVER WELL ] the body: a full-bleed portrait (when supplied) with
                    an oversized cover-headline SURNAME bleeding up from
                    the lower-left over the image, a kicker above it, and
                    a vertical stack of "cover lines" (event, hero stat)
                    pinned down the right margin like real cover blurbs.
     [ COVERSTAR ]  a circular accent "coverstar" burst clipped to the
                    lower-right that carries the headline RESULT — the
                    one piece of furniture the eye lands on after the
                    name. Accent is the role the resolver guarantees
                    contrasts the primary (APCA gate), so primary-on-
                    accent inside the burst is a gate-checked legible
                    pair, never a hex literal.
     [ BARCODE ]    a thin faux price/issue strip bottom-right completes
                    the cover read (pure CSS bars, no data).

   Structural signature: masthead rail + portrait well + headline that
   overlaps the photo + a marginal column of cover lines + a circular
   coverstar burst. That reads as a magazine cover, distinct from the
   centred numeral (big_number_dominant), the lower-third band
   (full_bleed_photo_lower_third), the angled wedge (split_diagonal_hero),
   the vertical rail (stat_stack_sidebar), the horizontal broadcast bands
   (ticker_strip) and the three vertical bays (triptych_progression).

   No-photo degrade: when no portrait is supplied the cover well falls
   back to a solid brand-ground field, so the headline + coverstar still
   compose as a strong typographic cover rather than a hole.

   Overflow safety: the cover headline surname uses the full-canvas
   mega-name autofit var scaled to 0.74 (the headline sits in the
   left ~67% of the canvas, clear of the right cover-line column) AND
   wraps/break-anywhere so a long or space-less name flows to a second
   line instead of clipping. The coverstar result uses the result
   autofit var scaled to 0.30 to fit the circular burst and also breaks.
   Cover lines wrap. Holds at 1080x1350 and 1080x1920: the cover well
   simply grows taller, the masthead stays top-anchored and the
   coverstar + barcode stay bottom-anchored.
   =================================================================== */

.mc {
  position: relative;
  width: {{WIDTH}}px;
  height: {{HEIGHT}}px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  background: var(--mh-ground-gradient, var(--mh-primary));
  color: var(--mh-on-primary);
  font-family: var(--mh-font-body, 'Inter', system-ui, sans-serif);
  -webkit-font-smoothing: antialiased;
}
.mc *, .mc *::before, .mc *::after { box-sizing: border-box; }

/* ---- MASTHEAD rail ---- */
.mc__masthead {
  position: relative;
  z-index: 4;
  flex: 0 0 auto;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 28px;
  padding: 60px 56px 22px;
  border-bottom: 6px solid var(--mh-accent);
  background: var(--mh-primary);
}
.mc__title {
  font-family: var(--mh-font-display, 'Anton','Bebas Neue',Impact,sans-serif); font-weight: 400;
  font-size: 76px; line-height: 0.86; letter-spacing: 0.005em;
  text-transform: uppercase; color: var(--mh-on-primary);
  overflow-wrap: anywhere; word-break: break-word; max-width: 70%;
}
.mc__issue {
  text-align: right; flex: 0 0 auto;
  font-family: var(--mh-font-kicker, 'Space Grotesk','Inter',sans-serif); font-weight: 700;
  font-size: 17px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--mh-accent); line-height: 1.3;
  overflow-wrap: anywhere; max-width: 40%;
}

/* ---- COVER WELL ---- */
.mc__well {
  position: relative;
  flex: 1 1 auto;
  overflow: hidden;
  background: var(--mh-primary);
}
.mc__photo { position: absolute; inset: 0; z-index: 0; }
.mc__photo img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: var(--mh-photo-pos, center 26%);
}
/* a gradient scrim from the lower-left lifts the headline off the photo
   so primary-derived text stays legible over a bright image. */
.mc__scrim {
  position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(
    7deg,
    var(--mh-primary) 6%,
    color-mix(in srgb, var(--mh-primary) 62%, transparent) 34%,
    transparent 60%
  );
}

/* headline overlapping the photo, anchored lower-left */
.mc__headline {
  position: absolute; z-index: 3;
  left: 56px; right: 33%; bottom: 150px;
}
/* the kicker pill collapses entirely when no achievement label is
   supplied, so an unused slot never leaves an empty accent bar. */
.mc__kicker:empty { display: none; }
.mc__kicker {
  display: inline-flex; align-items: center; gap: 12px;
  margin-bottom: 16px;
  font-family: var(--mh-font-kicker, 'Space Grotesk','Inter',sans-serif); font-weight: 700;
  font-size: 22px; letter-spacing: 0.16em; text-transform: uppercase;
  /* primary-on-accent is the resolver's APCA-gated legible pair (the
     accent role can resolve to any brand colour incl. white, so on-primary
     text on accent could collide); matches the coverstar burst. */
  color: var(--mh-primary);
  background: var(--mh-accent);
  padding: 9px 18px; border-radius: 4px;
  overflow-wrap: anywhere;
}
.mc__first {
  font-family: var(--mh-font-kicker, 'Space Grotesk','Inter',sans-serif); font-weight: 700;
  font-size: 46px; line-height: 0.98; letter-spacing: 0.01em;
  text-transform: uppercase; color: var(--mh-accent); margin-bottom: 2px;
  white-space: normal; overflow-wrap: anywhere; word-break: break-word;
}
.mc__surname {
  font-family: var(--mh-font-display, 'Anton','Bebas Neue',Impact,sans-serif); font-weight: 400;
  /* mega-name autofit is sized for a full-canvas single line; the
     headline sits in the left ~67% of the canvas, so scale to 0.74 and
     allow wrapping so a long/space-less name never clips the photo. */
  font-size: calc(var(--mh-fit-mega-name-px, 200px) * 0.62);
  line-height: 0.84; letter-spacing: var(--mh-track-mega-name, -0.015em); text-transform: uppercase;
  color: var(--mh-on-primary);
  white-space: normal; overflow-wrap: anywhere; word-break: break-word;
  max-width: 100%;
}

/* cover-line column pinned down the right margin */
.mc__lines {
  position: absolute; z-index: 3;
  top: 54px; right: 50px; bottom: 150px;
  width: 27%;
  display: flex; flex-direction: column; align-items: flex-end;
  gap: 30px; text-align: right;
}
.mc__line { display: flex; flex-direction: column; align-items: flex-end; }
.mc__line-lab {
  font-family: var(--mh-font-body, 'Inter',sans-serif); font-weight: 800; font-size: 14px;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--mh-accent); margin-bottom: 7px;
}
.mc__line-val {
  font-family: var(--mh-font-kicker, 'Space Grotesk','Inter',sans-serif); font-weight: 600;
  font-size: 27px; line-height: 1.1; text-transform: uppercase;
  color: var(--mh-on-primary);
  overflow-wrap: anywhere; word-break: break-word;
}
/* a cover line collapses entirely when its value is empty, so an unused
   slot never leaves a dangling label down the margin. */
.mc__line:has(.mc__line-val:empty) { display: none; }

/* ---- COVERSTAR burst ---- */
.mc__star {
  position: absolute; z-index: 5;
  right: 48px; bottom: 132px;
  width: 296px; height: 296px;
  border-radius: 50%;
  background: var(--mh-accent);
  color: var(--mh-primary);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 26px;
  border: 7px solid var(--mh-primary);
}
.mc__star-tag {
  font-family: var(--mh-font-body, 'Inter',sans-serif); font-weight: 800; font-size: 16px;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--mh-primary); opacity: 0.82; margin-bottom: 8px;
  overflow-wrap: anywhere;
}
.mc__star-val {
  font-family: 'JetBrains Mono','Space Grotesk',monospace;
  font-feature-settings: "tnum"; font-weight: 700;
  /* result autofit box is ~52% of canvas; the burst is ~274px, so scale
     to 0.30 and let it break rather than clip the circle. */
  font-size: calc(var(--mh-fit-result-px, 92px) * 0.30); font-variation-settings: var(--mh-axes-result, normal);
  line-height: 0.9; letter-spacing: var(--mh-track-result, -0.01em); color: var(--mh-primary);
  white-space: normal; overflow-wrap: anywhere; word-break: break-word;
  max-width: 100%;
}

/* ---- FOOT strip: club lockup + faux barcode ---- */
.mc__foot {
  position: relative; z-index: 4;
  flex: 0 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  gap: 24px;
  padding: 24px 56px 50px;
  background: var(--mh-primary);
}
.mc__foot-left { display: flex; align-items: center; gap: 20px; min-width: 0; }
.mc__logo { height: 56px; width: auto; flex: 0 0 auto; }
.mc__logo img, .mc__logo svg { height: 100%; width: auto; object-fit: contain; display: block; }
.mc__club {
  font-family: var(--mh-font-body, 'Inter',sans-serif); font-weight: 800; font-size: 18px;
  line-height: 1.16; text-transform: uppercase; color: var(--mh-on-primary);
  overflow-wrap: anywhere; word-break: break-word;
}
/* faux issue/price strip — pure CSS bars, carries no data */
.mc__barcode {
  flex: 0 0 auto;
  height: 56px; width: 132px;
  background: repeating-linear-gradient(
    90deg,
    var(--mh-on-primary) 0, var(--mh-on-primary) 3px,
    transparent 3px, transparent 7px
  );
  opacity: 0.9;
}
.mc__sponsor { margin-top: 0; }
</style>
</head>
<body>
<div class="mc">

  <div class="mc__masthead">
    <div class="mc__title">{{CLUB_FULL}}</div>
    <div class="mc__issue">{{MEET_NAME}}</div>
  </div>

  <div class="mc__well">
    <div class="mc__photo">{{ATHLETE_IMG_BLOCK}}</div>
    <div class="mc__scrim"></div>

    <div class="mc__lines">
      <div class="mc__line">
        <div class="mc__line-lab">Event</div>
        <div class="mc__line-val">{{EVENT_NAME}}</div>
      </div>
      <div class="mc__line">
        <div class="mc__line-lab">Highlight</div>
        <div class="mc__line-val">{{HERO_STAT}}</div>
      </div>
    </div>

    <div class="mc__headline">
      <div class="mc__kicker">{{ACHIEVEMENT_LABEL}}</div>
      <div class="mc__first">{{ATHLETE_FIRST_NAME}}</div>
      <div class="mc__surname">{{ATHLETE_SURNAME_DISPLAY}}</div>
    </div>

    <div class="mc__star">
      <div class="mc__star-tag">Result</div>
      <div class="mc__star-val">{{RESULT_VALUE}}</div>
    </div>
  </div>

  <div class="mc__foot">
    <div class="mc__foot-left">
      <div class="mc__logo">{{LOGO_BLOCK}}</div>
      <div class="mc__club">{{CLUB_FULL}}</div>
    </div>
    <div class="mc__barcode"></div>
    <div class="mc__sponsor">{{SPONSOR_BLOCK}}</div>
  </div>

  {{ACCENT_DECORATION}}

</div>
</body>
</html>
