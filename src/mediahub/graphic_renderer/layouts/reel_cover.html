<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Reel — {{ATHLETE_FULL_NAME}}</title>
<style>{{BASE_CSS}}

:root {
  --primary: {{PRIMARY}};
  --primary-deep: {{PRIMARY_DEEP}};
  --secondary: {{SECONDARY}};
  --accent: {{ACCENT}};
  --water-pattern: {{WATER_PATTERN}};
  --noise-pattern: {{NOISE_PATTERN}};
}

.canvas {
  width: {{WIDTH}}px; height: {{HEIGHT}}px;
  background: #000;
}

.bg-tint {
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 90% 70% at 50% 80%, var(--primary) 0%, transparent 60%),
    linear-gradient(180deg, #000 0%, var(--primary-deep) 100%);
}

.athlete-wrap {
  inset: 0;
  width: 100%; height: 100%;
}

.athlete-cutout {
  object-position: center;
  filter: contrast(1.18) brightness(1.04) drop-shadow(0 30px 60px rgba(0,0,0,0.7));
}

/* Title-led cover (no photo): giant headline + tag in center */
.cover-mega {
  position: absolute;
  top: 22%;
  left: 6%; right: 6%;
  z-index: 5;
  text-align: center;
  font-family: 'Anton', 'Bebas Neue', Impact, sans-serif;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: -0.02em;
  line-height: 0.86;
  font-size: {{MEGA_FONT_SIZE}}px;
  color: #fff;
  text-shadow: 0 8px 40px rgba(0,0,0,0.55);
}
.cover-sub {
  position: absolute;
  bottom: 26%;
  left: 8%; right: 8%;
  z-index: 5;
  text-align: center;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 30px;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.78);
}

.cover-headline {
  position: absolute;
  bottom: 28%; left: 0; right: 0;
  z-index: 5;
  text-align: center;
  font-family: 'Anton', 'Bebas Neue', sans-serif;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: -0.02em;
  line-height: 0.88;
  font-size: {{HEADLINE_FONT_SIZE}}px;
  color: #fff;
  text-shadow: 0 6px 30px rgba(0,0,0,0.55);
}

.cover-name {
  position: absolute;
  bottom: 19%;
  left: 0; right: 0;
  z-index: 5;
  text-align: center;
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 36px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--accent);
}

.cover-tag {
  position: absolute;
  top: 12%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  background: var(--accent);
  color: var(--secondary);
  padding: 10px 18px;
  border-radius: 4px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 0.10em;
  text-transform: uppercase;
}

.cover-meet {
  position: absolute;
  bottom: 8%;
  left: 0; right: 0;
  z-index: 5;
  text-align: center;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 18px;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
}
</style>
</head>
<body>
<div class="canvas has-photo-{{HAS_PHOTO}}">
  <div class="bg-tint"></div>
  <div class="bg-noise"></div>

  {{PHOTO_ONLY_OPEN}}
  <div class="athlete-wrap">{{ATHLETE_IMG_BLOCK}}</div>
  <div class="cover-headline">{{ATHLETE_SURNAME_DISPLAY}}</div>
  <div class="cover-name">{{ATHLETE_FULL_NAME}}</div>
  {{PHOTO_ONLY_CLOSE}}

  <div class="cover-tag">{{ACHIEVEMENT_LABEL}}</div>

  {{TEXT_ONLY_OPEN}}
  {{TEXT_ONLY_CLOSE}}

  <!-- Text-led cover: mega name + event/time -->
  {{TEXT_LED_COVER_BLOCK}}

  <div class="cover-meet">{{MEET_NAME}}</div>

  <div class="brand-corner" style="bottom:18px; left:18px;">
    <div class="logo-mark" style="width:44px; height:44px;">{{LOGO_BLOCK}}</div>
    <div class="text-block">
      <div class="club-line">{{CLUB_FULL}}</div>
    </div>
  </div>
</div>
</body>
</html>
