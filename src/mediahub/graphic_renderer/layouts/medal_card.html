<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>{{ATHLETE_FULL_NAME}} — {{ACHIEVEMENT_LABEL}}</title>
<style>{{BASE_CSS}}

:root {
  --primary: {{PRIMARY}};
  --primary-deep: {{PRIMARY_DEEP}};
  --secondary: {{SECONDARY}};
  --accent: {{ACCENT}};
  --medal-light: {{MEDAL_LIGHT}};
  --medal-dark: {{MEDAL_DARK}};
  --water-pattern: {{WATER_PATTERN}};
  --ai-bg: url('{{AI_BG_URI}}');
  --noise-pattern: {{NOISE_PATTERN}};
}

.canvas { width: {{WIDTH}}px; height: {{HEIGHT}}px; }

.athlete-wrap {
  bottom: 0; left: -30px;
  width: {{ATHLETE_W}}px;
  height: {{ATHLETE_H}}px;
}

.surname-bg {
  bottom: {{SURNAME_BOTTOM}}px;
  left: {{SURNAME_LEFT}}px;
  font-size: {{SURNAME_FONT_SIZE}}px;
  color: rgba(255,255,255,0.20);
}

/* MR-9: weave the club PRIMARY into the card. The gold medal elements stay
   gold; the brand shows up as a left edge ribbon, a primary-tinted glow
   behind the canvas top, and the meet chip painted in PRIMARY. */
.brand-ribbon {
  position: absolute;
  top: 0; bottom: 0; left: 0;
  width: 18px;
  z-index: 6;
  background: linear-gradient(180deg, var(--primary) 0%, var(--primary-deep) 100%);
  box-shadow: 6px 0 24px rgba(0,0,0,0.30);
}
.brand-glow {
  position: absolute;
  top: -12%; left: -10%;
  width: 70%; height: 55%;
  z-index: 1;
  background: radial-gradient(ellipse at 30% 20%, var(--primary) 0%, transparent 65%);
  opacity: 0.35;
  pointer-events: none;
}
.brand-corner .meet-line {
  display: inline-block;
  background: var(--primary);
  color: #fff;
  padding: 4px 12px;
  border-radius: 6px;
  opacity: 1;
}

.fg-text { bottom: {{FG_TEXT_BOTTOM}}px; left: 56px; right: 460px; }
.fg-firstname { font-size: {{FIRSTNAME_FONT_SIZE}}px; }
.fg-event { font-size: {{EVENT_FONT_SIZE}}px; }
.label-ribbon { font-size: {{RIBBON_FONT_SIZE}}px; }
.medal-badge { width: {{MEDAL_SIZE}}px; height: {{MEDAL_SIZE}}px; right: 56px; }
.medal-badge .medal-text { font-size: {{MEDAL_FONT_SIZE}}px; }
</style>
</head>
<body>
<div class="canvas">
  <div class="bg-gradient" style="position:absolute;inset:0;z-index:0;"></div>
  <div class="brand-glow"></div>
  <div class="bg-ai"></div>
  <div class="bg-water-pattern"></div>
  <div class="bg-noise"></div>
  <div class="bg-vignette"></div>

  <div class="brand-ribbon"></div>

  <div class="surname-bg">{{ATHLETE_SURNAME_DISPLAY}}</div>

  {{PHOTO_ONLY_OPEN}}
  <div class="athlete-wrap">{{ATHLETE_IMG_BLOCK}}</div>
  {{PHOTO_ONLY_CLOSE}}

  <div class="medal-badge">
    <div class="medal-text">{{MEDAL_TEXT}}</div>
    <div class="medal-place">{{MEDAL_PLACE_LABEL}}</div>
  </div>

  <div class="label-ribbon">{{ACHIEVEMENT_LABEL}}</div>

  {{RESULT_CHIP_BLOCK}}

  <div class="fg-text">
    <div class="fg-firstname">{{ATHLETE_FIRST_NAME}}</div>
    <div class="fg-event">{{EVENT_NAME}}</div>
  </div>

  <div class="brand-corner">
    <div class="logo-mark{{LOGO_MARK_MOD}}">{{LOGO_BLOCK}}</div>
    <div class="text-block">
      <div class="club-line">{{CLUB_FULL}}</div>
      <div class="meet-line">{{MEET_NAME}}</div>
    </div>
  </div>

  {{MEDAL_BADGE_BLOCK}}
  {{SPONSOR_BLOCK}}
</div>
</body>
</html>
