<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Winners podium">
  <!-- 2nd place (left) -->
  <polygon points="8,58 32,58 37,53 13,53" fill="__SURFACE__"/>
  <polygon points="8,58 32,58 37,53 13,53" fill="__ON_GROUND__" opacity="0.16"/>
  <polygon points="32,58 37,53 37,87 32,92" fill="__SURFACE__"/>
  <polygon points="32,58 37,53 37,87 32,92" fill="__GROUND__" opacity="0.30"/>
  <rect x="8" y="58" width="24" height="34" fill="__SURFACE__"/>
  <text x="20" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="16" fill="__ON_SURFACE__">2</text>
  <!-- 3rd place (right) -->
  <polygon points="66,66 90,66 95,61 71,61" fill="__SECONDARY__"/>
  <polygon points="66,66 90,66 95,61 71,61" fill="__ON_GROUND__" opacity="0.16"/>
  <polygon points="90,66 95,61 95,87 90,92" fill="__SECONDARY__"/>
  <polygon points="90,66 95,61 95,87 90,92" fill="__GROUND__" opacity="0.30"/>
  <rect x="66" y="66" width="24" height="26" fill="__SECONDARY__"/>
  <text x="78" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="14" fill="__ON_GROUND__">3</text>
  <!-- star crowning the winner -->
  <path d="M49 24 l2.6 5.6 6.2 .5 -4.7 4 1.5 6 -5.6 -3.3 -5.6 3.3 1.5 -6 -4.7 -4 6.2 -.5 Z" fill="__ACCENT__"/>
  <!-- 1st place (centre, tallest) drawn last so it reads in front -->
  <polygon points="37,40 61,40 66,35 42,35" fill="__ACCENT__"/>
  <polygon points="37,40 61,40 66,35 42,35" fill="__ON_GROUND__" opacity="0.26"/>
  <polygon points="61,40 66,35 66,87 61,92" fill="__ACCENT__"/>
  <polygon points="61,40 66,35 66,87 61,92" fill="__GROUND__" opacity="0.30"/>
  <rect x="37" y="40" width="24" height="52" fill="__ACCENT__"/>
  <rect x="37" y="40" width="24" height="3" fill="__ON_GROUND__" opacity="0.22"/>
  <text x="49" y="71" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="22" fill="__GROUND__">1</text>
  <!-- floor line -->
  <line x1="4" y1="92" x2="96" y2="92" stroke="__OUTLINE__" stroke-width="2.5" stroke-linecap="round"/>
</svg>
