<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Winners podium">
  <!-- 2nd place (left) -->
  <rect x="7" y="55" width="27" height="37" rx="3" fill="__SURFACE__"/>
  <rect x="7" y="55" width="27" height="4" rx="2" fill="__ON_GROUND__" opacity="0.14"/>
  <text x="20.5" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="17" fill="__ON_SURFACE__">2</text>
  <!-- 1st place (centre, tallest) -->
  <rect x="36.5" y="38" width="27" height="54" rx="3" fill="__ACCENT__"/>
  <rect x="36.5" y="38" width="27" height="4" rx="2" fill="__ON_GROUND__" opacity="0.28"/>
  <text x="50" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="22" fill="__GROUND__">1</text>
  <!-- 3rd place (right) -->
  <rect x="66" y="64" width="27" height="28" rx="3" fill="__SECONDARY__"/>
  <rect x="66" y="64" width="27" height="4" rx="2" fill="__ON_GROUND__" opacity="0.16"/>
  <text x="79.5" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="15" fill="__ON_GROUND__">3</text>
  <!-- a star crowning the winner -->
  <path d="M50 25 l2.4 5.3 5.8 .5 -4.4 3.8 1.4 5.7 -5.2 -3.1 -5.2 3.1 1.4 -5.7 -4.4 -3.8 5.8 -.5 Z" fill="__ACCENT__"/>
  <!-- floor line -->
  <line x1="4" y1="92" x2="96" y2="92" stroke="__OUTLINE__" stroke-width="2.5" stroke-linecap="round"/>
</svg>
