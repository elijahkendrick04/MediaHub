<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Winners podium">
  <!-- 2nd place (left) -->
  <rect x="8" y="56" width="26" height="36" rx="2" fill="__SURFACE__"/>
  <text x="21" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="16" fill="__ON_SURFACE__">2</text>
  <!-- 1st place (centre, tallest) -->
  <rect x="37" y="40" width="26" height="52" rx="2" fill="__ACCENT__"/>
  <text x="50" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="20" fill="__GROUND__">1</text>
  <!-- 3rd place (right) -->
  <rect x="66" y="64" width="26" height="28" rx="2" fill="__SECONDARY__"/>
  <text x="79" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="__ON_GROUND__">3</text>
  <!-- floor line -->
  <line x1="4" y1="92" x2="96" y2="92" stroke="__OUTLINE__" stroke-width="2.5" stroke-linecap="round"/>
</svg>
