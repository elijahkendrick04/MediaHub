<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Coach whistle">
  <defs>
    <linearGradient id="whi__UID__" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="__ON_GROUND__" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="__ON_GROUND__" stop-opacity="0"/>
      <stop offset="1" stop-color="__GROUND__" stop-opacity="0.22"/>
    </linearGradient>
  </defs>
  <!-- lanyard looping up from the ring -->
  <path d="M60 33 C46 16 30 16 22 27" fill="none" stroke="__OUTLINE__" stroke-width="4" stroke-linecap="round"/>
  <!-- top ring -->
  <circle cx="62" cy="40" r="5.5" fill="none" stroke="__SECONDARY__" stroke-width="3.4"/>
  <!-- body: round chamber + mouthpiece -->
  <circle cx="62" cy="62" r="20" fill="__ACCENT__"/>
  <rect x="14" y="55" width="36" height="14" rx="4" fill="__ACCENT__"/>
  <circle cx="62" cy="62" r="20" fill="url(#whi__UID__)"/>
  <rect x="14" y="55" width="36" height="14" rx="4" fill="url(#whi__UID__)"/>
  <!-- pea hole on top of the chamber -->
  <circle cx="62" cy="54" r="5" fill="__GROUND__"/>
  <!-- air slot at the mouthpiece -->
  <rect x="17" y="59.5" width="8" height="4" rx="2" fill="__GROUND__" opacity="0.55"/>
  <!-- whistle blast -->
  <path d="M86 56 q8 1 8 8 M86 66 q12 0 12 -11" fill="none" stroke="__ACCENT__" stroke-width="3.2" stroke-linecap="round" opacity="0.85"/>
</svg>
