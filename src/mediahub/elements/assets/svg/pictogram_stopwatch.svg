<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Stopwatch">
  <defs>
    <radialGradient id="dial__UID__" cx="0.38" cy="0.32" r="0.85">
      <stop offset="0" stop-color="__ON_SURFACE__" stop-opacity="0.20"/>
      <stop offset="0.6" stop-color="__ON_SURFACE__" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- crown / start button + stem -->
  <rect x="43" y="5" width="14" height="7" rx="3" fill="__ACCENT__"/>
  <rect x="46.5" y="11" width="7" height="7" fill="__SECONDARY__"/>
  <!-- side button -->
  <rect x="75" y="20" width="11" height="7" rx="2.5" transform="rotate(45 80.5 23.5)" fill="__SECONDARY__"/>
  <!-- dial -->
  <circle cx="50" cy="58" r="35" fill="__SECONDARY__"/>
  <circle cx="50" cy="58" r="30" fill="__SURFACE__"/>
  <circle cx="50" cy="58" r="30" fill="url(#dial__UID__)"/>
  <circle cx="50" cy="58" r="35" fill="none" stroke="__ACCENT__" stroke-width="4"/>
  <!-- twelve tick marks -->
  <g stroke="__ON_SURFACE__" stroke-linecap="round" opacity="0.8">
    <line x1="50" y1="31" x2="50" y2="37" stroke-width="2.6"/>
    <line x1="50" y1="79" x2="50" y2="85" stroke-width="2.6"/>
    <line x1="23" y1="58" x2="29" y2="58" stroke-width="2.6"/>
    <line x1="71" y1="58" x2="77" y2="58" stroke-width="2.6"/>
    <line x1="36.5" y1="34.6" x2="38.5" y2="38.1" stroke-width="1.7"/>
    <line x1="61.5" y1="77.9" x2="63.5" y2="81.4" stroke-width="1.7"/>
    <line x1="63.5" y1="34.6" x2="61.5" y2="38.1" stroke-width="1.7"/>
    <line x1="38.5" y1="77.9" x2="36.5" y2="81.4" stroke-width="1.7"/>
    <line x1="26.6" y1="44.5" x2="30.1" y2="46.5" stroke-width="1.7"/>
    <line x1="69.9" y1="69.5" x2="73.4" y2="71.5" stroke-width="1.7"/>
    <line x1="73.4" y1="44.5" x2="69.9" y2="46.5" stroke-width="1.7"/>
    <line x1="30.1" y1="69.5" x2="26.6" y2="71.5" stroke-width="1.7"/>
  </g>
  <!-- hand sweeping toward a split -->
  <line x1="50" y1="58" x2="67" y2="41" stroke="__ACCENT__" stroke-width="4" stroke-linecap="round"/>
  <circle cx="50" cy="58" r="4.5" fill="__ACCENT__"/>
  <circle cx="50" cy="58" r="2" fill="__SURFACE__"/>
</svg>
