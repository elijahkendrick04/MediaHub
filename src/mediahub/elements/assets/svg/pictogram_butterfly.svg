<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Butterfly swimmer">
  <path d="M5 80 Q19 74 33 80 T61 80 T89 80 T97 80" fill="none" stroke="__OUTLINE__" stroke-width="3" stroke-linecap="round"/>
  <path d="M5 72 Q19 66 33 72 T61 72 T89 72 T97 72" fill="none" stroke="__ACCENT__" stroke-width="3.4" stroke-linecap="round"/>
  <!-- both arms swept wide in the butterfly recovery -->
  <path d="M48 56 C32 40 30 30 41 23" fill="none" stroke="__ACCENT__" stroke-width="7.5" stroke-linecap="round"/>
  <path d="M52 54 C64 38 72 32 84 31" fill="none" stroke="__ACCENT__" stroke-width="7.5" stroke-linecap="round"/>
  <!-- arched body diving down then driving forward -->
  <path d="M14 66 C26 52 40 50 52 56 C60 60 66 58 73 50" fill="none" stroke="__ACCENT__" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- head pressed down between the arms -->
  <circle cx="54" cy="57" r="8.5" fill="__ACCENT__"/>
  <!-- entry splash -->
  <path d="M15 62 l-7 -4 M12 68 l-6 -1" stroke="__ACCENT__" stroke-width="3.4" stroke-linecap="round"/>
</svg>
