<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Backstroke swimmer">
  <path d="M5 80 Q19 74 33 80 T61 80 T89 80 T97 80" fill="none" stroke="__OUTLINE__" stroke-width="3" stroke-linecap="round"/>
  <path d="M5 72 Q19 66 33 72 T61 72 T89 72 T97 72" fill="none" stroke="__ACCENT__" stroke-width="3.4" stroke-linecap="round"/>
  <!-- straight recovery arm reaching back over the head -->
  <path d="M60 52 C66 34 60 23 46 23" fill="none" stroke="__ACCENT__" stroke-width="8" stroke-linecap="round"/>
  <!-- body face-up along the surface, trailing legs -->
  <path d="M11 56 C27 62 41 64 57 60" fill="none" stroke="__ACCENT__" stroke-width="12.5" stroke-linecap="round"/>
  <!-- catch arm driving down past the hip -->
  <path d="M61 60 C72 62 80 60 88 53" fill="none" stroke="__ACCENT__" stroke-width="7.5" stroke-linecap="round"/>
  <!-- head leading, face up -->
  <circle cx="70" cy="56" r="9" fill="__ACCENT__"/>
  <!-- kick splash -->
  <path d="M12 60 l-7 5 M9 54 l-6 2" stroke="__ACCENT__" stroke-width="3.4" stroke-linecap="round"/>
</svg>
