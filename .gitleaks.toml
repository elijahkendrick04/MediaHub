# gitleaks configuration — security/secrets-and-config (THREAT_MODEL §7).
# Full-history scan runs in CI (.github/workflows/security.yml) and locally:
#   gitleaks git --no-banner --redact .

[extend]
useDefault = true

[allowlist]
description = "Known false positives — synthetic test values, never real credentials"
regexTarget = "line"
regexes = [
  # tests/test_official_pb_detector.py builds composite swim ids from a fake
  # swimmer_key ("jane-smith-001"); the generic-api-key rule matches the
  # `..._key="..."` assignment shape. Synthetic fixture, not a secret.
  '''swimmer_key="[a-z-]+-\d{3}"''',
  # Billing/webhook tests use self-describing placeholder Stripe keys
  # ("sk_test_placeholder", "sk_test_placeholder_not_a_real_key"); the
  # stripe-access-token rule matches the bare quoted form. Synthetic, never
  # a real credential — real keys are env-only (CLAUDE.md secrets rule).
  '''"sk_test_placeholder(_[a-z_]+)?"''',
  # tests/test_caption_assist.py's module docstring — the generic-api-key
  # rule matches the prose "…empty/invalid guards, honest no-key handling…"
  # in five historical commits. Documentation text, not a credential.
  '''empty/invalid guards, honest no-key handling''',
  # tests/test_club_profile_token_scrub.py verifies at-rest scrubbing of
  # withdrawn Buffer/scheduler tokens; its fixtures use self-describing
  # synthetic values ("tok-buf-789", "tok-sched-123"). The generic-api-key
  # rule matches the `..._access_token": "..."` shape. Never real credentials.
  '''"(buffer|scheduler)_access_token":\s*"tok-(buf|sched)-\d{3}"''',
  # The Gemini transport/parity/redaction tests use self-describing fake
  # keys ("AIzaSyTEST-parity-not-a-real-key", "AIzaSyTEST-do-not-leak-XYZ789",
  # …). Their prose-like suffixes sit below the generic-api-key entropy gate
  # today; this entry is defence-in-depth so a future rule/threshold bump
  # can't start failing history. Synthetic, never real credentials.
  '''AIzaSyTEST-[A-Za-z0-9_-]+''',
  # tests/test_ai_core_gemini_parity.py's tool-loop helper passes the kwarg
  # echo `max_tokens=max_tokens` on one line; the generic-api-key rule keys
  # on the "tokens…=" shape and captures the right-hand identifier as a
  # "secret" (entropy 3.58). Python syntax, not a credential.
  '''max_tokens=max_tokens''',
]
paths = [
  # Vendored reference material (never executed) and binary corpora.
  '''^vendor/''',
  '''^samples/learning_corpus/''',
]
