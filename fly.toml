# fly.toml — Fly.io deployment spec
# Deploy:  fly launch --copy-config --no-deploy
#          fly secrets set ANTHROPIC_API_KEY=... REPLICATE_API_TOKEN=...
#          fly deploy

app = "mediahub"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "5000"
  FLASK_ENV = "production"
  PYTHONPATH = "/app/src"
  MEDIAHUB_CUTOUT_PROVIDER = "server"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[mounts]]
  source = "mediahub_data"
  destination = "/app/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
