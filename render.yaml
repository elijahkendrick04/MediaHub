# Render.com deploy — uses the project's Dockerfile.
#
# Why Docker not the Python runtime: Render's Python image filesystem is
# read-only and root-less, so `apt-get install nodejs` and
# `playwright install --with-deps` both fail at build time (see the
# May 2026 build log: "List directory /var/lib/apt/lists/partial is
# missing - Read-only file system"). The project's Dockerfile already
# installs Node 20, Playwright + Chromium with system deps, and the
# Remotion node_modules in one go, so we point Render at it directly.
#
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: mediahub
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Standard tier ($25/mo, 2 GB RAM, 1 CPU). Required because
    # Remotion's Chromium render peaks above the 512 MB Starter cap and
    # persistent disks need at least this tier in the current Render
    # pricing. Keep this in sync with the dashboard Instance Type so a
    # future Blueprint sync can't silently downgrade the service.
    plan: standard
    # Startup behaviour (persistent-disk setup + gunicorn) lives in
    # scripts/docker-entrypoint.sh, which the Dockerfile CMD invokes.
    # Don't set dockerCommand here — Render passes its value as a
    # single argv string, so multi-token shell pipelines fail with
    # "sh: 1: <whole command>: not found" (see the May 2026 log).
    healthCheckPath: /healthz
    envVars:
      # LLM provider (REQUIRED). Gemini is the default; Claude is an
      # optional higher-quality fallback. Without either key, AI
      # features return "AI unavailable" instead of inventing output.
      - key: GEMINI_API_KEY
        sync: false
      # Optional Claude key. Set MEDIAHUB_LLM_PROVIDER=anthropic to
      # force-prefer Claude even when Gemini is also configured.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MEDIAHUB_LLM_PROVIDER
        value: auto
      # Image cutout providers. Default `server` runs rembg in-process
      # on the deployment's CPU (free, no per-image API spend); override
      # with `replicate` or `photoroom` + the matching token for paid
      # higher-quality cutouts. The legacy values `local` and `rembg`
      # are accepted aliases for `server` for backward compatibility.
      - key: MEDIAHUB_CUTOUT_PROVIDER
        value: server
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: PHOTOROOM_API_KEY
        sync: false
      # Device pixel ratio used by graphic_renderer when rasterising
      # HTML→PNG.
      - key: MEDIAHUB_RENDER_DPR
        value: "2"
      # Persistent data — mounted disk at /var/mediahub.
      - key: DATA_DIR
        value: /var/mediahub
      - key: RUNS_DIR
        value: /var/mediahub/runs_v4
      - key: UPLOADS_DIR
        value: /var/mediahub/uploads_v4
      # Auto-generated by Render if absent — rotate via the dashboard
      # when you suspect compromise.
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      # Operator developer sign-in needs no configuration: the home-page
      # "Developer access" link and the /developer route are public and
      # passwordless (one click grants an unrestricted operator session). See
      # docs/adr/0018-public-passwordless-operator-signin.md for the rationale
      # and the accepted risk.
      # --- In-container SearXNG metasearch (Capability 3, OPTIONAL) ---
      # Runs stock SearXNG as a localhost-only process INSIDE this container —
      # no new service, no extra cost. It uses ~150-250 MB RAM; Playwright /
      # Chromium already spike during video renders, so if you ever see memory
      # pressure (/healthz/memory) or worker restarts, set MEDIAHUB_RUN_SEARXNG
      # to "0" to turn it off (MediaHub then uses free DuckDuckGo, unchanged).
      # Non-fatal either way. See docs/SEARXNG.md.
      - key: MEDIAHUB_RUN_SEARXNG
        value: "1"
      - key: MEDIAHUB_SEARCH_ENDPOINT
        value: http://127.0.0.1:8888
      # --- Log sentinel (OPTIONAL watchdog; docs/LOG_SENTINEL.md) ---
      # Polls this service's own logs via the Render API, notifies on known
      # failure patterns, and (double-opt-in, rate-capped, kill-switched)
      # auto-applies the playbook fix. Inert until both secrets are set in
      # the dashboard. Notifications need MEDIAHUB_NTFY_TOPIC or
      # MEDIAHUB_NOTIFY_WEBHOOK (also sync: false, operator-set).
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_SERVICE_ID
        sync: false
      - key: MEDIAHUB_NTFY_TOPIC
        sync: false
      - key: MEDIAHUB_NOTIFY_WEBHOOK
        sync: false
      # Auto-fix stays notify-only until the operator flips these to "1"
      # per docs/LOG_SENTINEL.md (double opt-in + kill switch + caps).
      - key: MEDIAHUB_SENTINEL_AUTOFIX
        value: "0"
      # GitHub escalation: findings filed as `sentinel` issues that appear in
      # docs/ROADMAP.md -> "Production findings". Fine-grained PAT (Issues RW
      # on this repo only), operator-set in the dashboard.
      - key: MEDIAHUB_SENTINEL_GITHUB_TOKEN
        sync: false
      - key: MEDIAHUB_SENTINEL_GITHUB_REPO
        value: elijahkendrick04/MediaHub
      - key: MEDIAHUB_PUBLIC_BASE_URL
        value: https://mediahub-gzwc.onrender.com
    disk:
      name: mediahub-data
      mountPath: /var/mediahub
      sizeGB: 1
