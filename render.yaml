# Render.com deploy — uses the project's Dockerfile.
#
# Why Docker not the Python runtime: Render's Python image filesystem is
# read-only and root-less, so `apt-get install nodejs` and
# `playwright install --with-deps` both fail at build time (see the
# May 2026 build log: "List directory /var/lib/apt/lists/partial is
# missing - Read-only file system"). The project's Dockerfile already
# installs Node 20, Playwright + Chromium with system deps, and the
# Remotion node_modules in one go, so we point Render at it directly.
#
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: mediahub
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    # The Dockerfile's CMD already starts gunicorn on $PORT. We override
    # only to ensure the persistent-disk dirs exist before gunicorn runs.
    dockerCommand: >-
      sh -c "mkdir -p /var/mediahub/data /var/mediahub/runs_v4 /var/mediahub/uploads_v4
      && cp -rn /app/data/. /var/mediahub/data/ 2>/dev/null || true
      && exec gunicorn mediahub.web:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 300"
    healthCheckPath: /healthz
    envVars:
      # AI providers — any of these unlocks the engine. Auto-routes via
      # /settings; see mediahub.ai_core.active_provider().
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Image cutout providers (optional).
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: PHOTOROOM_API_KEY
        sync: false
      - key: MEDIAHUB_CUTOUT_PROVIDER
        value: rembg
      # Persistent data — mounted disk at /var/mediahub.
      - key: DATA_DIR
        value: /var/mediahub
      - key: RUNS_DIR
        value: /var/mediahub/runs_v4
      - key: UPLOADS_DIR
        value: /var/mediahub/uploads_v4
      - key: FLASK_ENV
        value: production
    disk:
      name: mediahub-data
      mountPath: /var/mediahub
      sizeGB: 1
