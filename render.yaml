# Render.com one-click deploy
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: mediahub
    runtime: python
    plan: starter
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      pip install gunicorn
      pip install -e .
    startCommand: >-
      mkdir -p /var/mediahub/data /var/mediahub/runs_v4 /var/mediahub/uploads_v4 &&
      cp -rn data/. /var/mediahub/data/ &&
      exec gunicorn mediahub.web:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 300
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: PYTHONPATH
        value: src
      - key: FLASK_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: PHOTOROOM_API_KEY
        sync: false
      - key: MEDIAHUB_CUTOUT_PROVIDER
        value: rembg
      - key: DATA_DIR
        value: /var/mediahub
      - key: RUNS_DIR
        value: /var/mediahub/runs_v4
      - key: UPLOADS_DIR
        value: /var/mediahub/uploads_v4
    disk:
      name: mediahub-data
      mountPath: /var/mediahub
      sizeGB: 1
