# Render.com one-click deploy
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: mediahub
    runtime: python
    plan: starter
    buildCommand: |
      # Install Node.js 20 (required for Remotion motion/reel rendering).
      # Render's Python image doesn't ship Node, so install via NodeSource.
      # Errors are tolerated so a missing-node environment still deploys
      # (motion/reel routes surface a clear "Node not installed" error).
      (curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs) || true
      pip install --upgrade pip
      pip install -r requirements.txt
      pip install gunicorn
      pip install -e .
      # Install Remotion node modules so /api/.../motion and /reel work.
      (cd src/mediahub/remotion && npm install --no-audit --no-fund) || true
    startCommand: >-
      mkdir -p /var/mediahub/data /var/mediahub/runs_v4 /var/mediahub/uploads_v4 &&
      cp -rn data/. /var/mediahub/data/ &&
      exec gunicorn mediahub.web:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 300
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: PYTHONPATH
        value: src
      - key: FLASK_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: PHOTOROOM_API_KEY
        sync: false
      - key: MEDIAHUB_CUTOUT_PROVIDER
        value: rembg
      - key: DATA_DIR
        value: /var/mediahub
      - key: RUNS_DIR
        value: /var/mediahub/runs_v4
      - key: UPLOADS_DIR
        value: /var/mediahub/uploads_v4
    disk:
      name: mediahub-data
      mountPath: /var/mediahub
      sizeGB: 1
